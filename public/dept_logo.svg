<svg width="240" height="240" viewBox="0 0 240 240" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3.5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <!-- Cultural Gradients -->
    <linearGradient id="dancheongGreen" x1="0" y1="120" x2="0" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#00FFA3" stop-opacity="0.8" />
      <stop offset="1" stop-color="#00FFA3" stop-opacity="0.1" />
    </linearGradient>
    <linearGradient id="roofTop" x1="120" y1="60" x2="120" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#00F2FF" stop-opacity="0.9" />
      <stop offset="1" stop-color="#00F2FF" stop-opacity="0.3" />
    </linearGradient>
  </defs>

  <!-- Ground / Stone Platform (Woldae) -->
  <g opacity="0.3">
    <path d="M40 180 L140 180 L130 190 L50 190 Z" fill="#00F2FF" opacity="0.2" />
    <line x1="40" y1="180" x2="120" y2="180" stroke="#00F2FF" stroke-width="0.8" />
  </g>

  <!-- Detailed Gyeongbokgung (Inspired by Geunjeongjeon) -->
  <g filter="url(#glow)">
    <!-- Main Structure: Pillars and Latticework -->
    <g opacity="0.8">
      <!-- Left & Center Pillars (Intact) -->
      <rect x="55" y="140" width="4" height="40" fill="#00F2FF" opacity="0.6" />
      <rect x="90" y="140" width="4" height="40" fill="#00F2FF" opacity="0.6" />
      
      <!-- Latticework Detail -->
      <path d="M65 145 H85 V175 H65 Z" stroke="#00F2FF" stroke-width="0.5" opacity="0.4" />
      <path d="M65 155 H85" stroke="#00F2FF" stroke-width="0.3" opacity="0.3" />
      <path d="M65 165 H85" stroke="#00F2FF" stroke-width="0.3" opacity="0.3" />
      <path d="M72 145 V175" stroke="#00F2FF" stroke-width="0.3" opacity="0.3" />
      <path d="M78 145 V175" stroke="#00F2FF" stroke-width="0.3" opacity="0.3" />
    </g>

    <!-- Lower Roof (Tier 1) -->
    <path d="M35 140 Q100 115 140 135" stroke="#00F2FF" stroke-width="2.5" stroke-linecap="round" />
    <path d="M30 142 L15 135" stroke="#00F2FF" stroke-width="4" stroke-linecap="round" /> <!-- Left Corner -->
    
    <!-- Upper Roof (Tier 2 - Geunjeongjeon signet) -->
    <path d="M55 105 Q100 85 130 95" stroke="url(#roofTop)" stroke-width="3" stroke-linecap="round" />
    <path d="M50 108 L35 100" stroke="#00F2FF" stroke-width="5" stroke-linecap="round" /> <!-- Upper Left Corner -->
    
    <!-- Dissolving Connection -->
    <path d="M120 105 L120 140" stroke="#00F2FF" stroke-width="1.5" stroke-dasharray="2 4" opacity="0.5" />

    <!-- Detailed Rafters (Rounded Logs) - Dissolving toward right -->
    <g opacity="0.9">
      <line x1="50" y1="145" x2="50" y2="155" stroke="#00F2FF" stroke-width="3" stroke-linecap="round" />
      <circle cx="50" cy="157" r="1.5" fill="#00F2FF" />
      <line x1="75" y1="142" x2="75" y2="152" stroke="#00F2FF" stroke-width="3" stroke-linecap="round" />
      <circle cx="75" cy="154" r="1.5" fill="#00F2FF" />
      <line x1="100" y1="140" x2="100" y2="148" stroke="#00F2FF" stroke-width="3" stroke-linecap="round" stroke-dasharray="2 2" />
    </g>
  </g>

  <!-- The Great Dissolution: Transitioning into Obangsaek Particles -->
  <g filter="url(#glow)">
    <!-- Right side is completely scattering -->
    
    <!-- Crimson Red (Scattering from Roof/Pillars) -->
    <rect x="170" y="80" width="14" height="14" fill="#FF2D55" transform="rotate(45 177 87)" />
    <rect x="145" y="150" width="9" height="9" fill="#FF2D55" opacity="0.8" />
    <rect x="200" y="120" width="6" height="6" fill="#FF2D55" opacity="0.4" />
    
    <!-- Neon Blue (Traditional deep blue energy) -->
    <rect x="150" y="100" width="12" height="12" fill="#007AFF" transform="rotate(-15 156 106)" />
    <rect x="185" y="160" width="10" height="10" fill="#007AFF" opacity="0.7" />
    <rect x="210" y="70" width="8" height="8" fill="#007AFF" opacity="0.3" />
    
    <!-- Neon Yellow (Gold/Light of heritage) -->
    <rect x="130" y="70" width="10" height="10" fill="#FFEE00" opacity="0.9" transform="rotate(20 135 75)" />
    <rect x="195" y="95" width="7" height="7" fill="#FFEE00" opacity="0.6" />
    
    <!-- Pure White / Digital Glitch Particles -->
    <rect x="110" y="165" width="5" height="5" fill="#FFFFFF" opacity="1" />
    <rect x="160" y="180" width="4" height="4" fill="#00F2FF" opacity="0.6" />
    <rect x="220" y="140" width="3" height="3" fill="#FFFFFF" opacity="0.8" />
  </g>

  <!-- Architectural Accents: Dancheong Colors embedded in intact parts -->
  <circle cx="65" cy="140" r="2" fill="#00FFA3" opacity="0.6" />
  <circle cx="90" cy="140" r="2" fill="#FF2D55" opacity="0.6" />
  <circle cx="100" cy="100" r="1.5" fill="#FFEE00" opacity="0.5" />

  <!-- Motion/Flow Lines -->
  <g opacity="0.3" stroke="#FFFFFF" stroke-width="0.5" stroke-dasharray="3 6">
    <path d="M140 95 L180 85" />
    <path d="M120 150 L160 160" />
    <path d="M180 140 L210 150" />
  </g>
</svg>
